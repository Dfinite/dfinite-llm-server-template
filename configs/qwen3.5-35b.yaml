# Qwen3.5-35B-A3B — MoE 모델
# ═══════════════════════════════════════════════════════════════
# MoE 35B total / 3B active — Gated Delta Networks 아키텍처
# A6000 48GB × 2 (tp=2) 기준 GPTQ-Int4 권장
#
# ⚠️ vLLM ≥ 0.18.0 필요 (qwen3_5_moe 아키텍처 + transformers 4.56.x 포함)
#   → ./start.sh qwen3.5-35b --tag v0.18.0
#
# ⚠️ BF16 사용 시 ~70GB VRAM → max_model_len 줄여야 함
#    GPTQ-Int4 사용 시 ~20GB → 넉넉한 context 가능
# ═══════════════════════════════════════════════════════════════

model:
  name: "qwen3.5-35b"
  # GPTQ-Int4 (권장: A6000 환경)
  path: "Qwen/Qwen3.5-35B-A3B-GPTQ-Int4"
  # BF16 원본 사용 시: "Qwen/Qwen3.5-35B-A3B"
  description: "Qwen3.5 35B MoE — 에이전트/thinking 모드 (vLLM ≥0.18.0)"

vllm:
  port: 10071
  tensor_parallel_size: 2
  max_model_len: 131072            # GPTQ-Int4: 128K 가능 / BF16: 32768로 줄일 것
  gpu_memory_utilization: 0.85
  dtype: "auto"
  quantization: "moe_wna16"

  # Reasoning (Qwen3.5 전용 parser)
  reasoning_parser: "qwen3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  # Gated Delta Networks + MoE → CUDA graph 이슈 가능 — 에러 시 true로
  enforce_eager: false
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  extra_args: []
