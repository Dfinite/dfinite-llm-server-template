# Qwen3.5-35B-A3B — MoE 모델
# ═══════════════════════════════════════════════════════════════
# MoE 35B total / 3B active — Gated Delta Networks 아키텍처
# A6000 48GB × 2 (tp=2) 기준 GPTQ-Int4 권장
#
# ⚠️ 버전 요구사항:
#   - vLLM ≥ 0.17.0 (v0.16.0 미지원 확인됨)
#   - Transformers ≥ 5.0 필수 (qwen3_5_moe 아키텍처)
#   - Docker: nightly 또는 v0.18.0+ 권장
#     → ./start.sh qwen3.5-35b --tag nightly
#   - v0.17.1에서 아키텍처 미인식 시:
#     FROM vllm/vllm-openai:v0.17.1
#     RUN uv pip install --system git+https://github.com/huggingface/transformers.git
#
# ⚠️ BF16 사용 시 ~70GB VRAM → max_model_len 줄여야 함
#    GPTQ-Int4 사용 시 ~20GB → 넉넉한 context 가능
# ═══════════════════════════════════════════════════════════════

model:
  name: "qwen3.5-35b"
  # GPTQ-Int4 (권장: A6000 환경)
  path: "Qwen/Qwen3.5-35B-A3B-GPTQ-Int4"
  # BF16 원본 사용 시: "Qwen/Qwen3.5-35B-A3B"
  description: "Qwen3.5 35B MoE — 에이전트/thinking 모드 (vLLM ≥0.17, nightly 권장)"

vllm:
  port: 8000
  tensor_parallel_size: 2
  max_model_len: 131072            # GPTQ-Int4: 128K 가능 / BF16: 32768로 줄일 것
  gpu_memory_utilization: 0.85
  dtype: "auto"

  # Reasoning (Qwen3.5 전용 parser)
  reasoning_parser: "qwen3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  # ⚠️ Gated Delta Networks + MoE → CUDA graph 이슈 가능
  enforce_eager: true
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  extra_args: []
