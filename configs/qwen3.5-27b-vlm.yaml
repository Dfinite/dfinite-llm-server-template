# Qwen3.5-27B — Vision Language Model (VLM) 설정
# ═══════════════════════════════════════════════════════════════
# Qwen3.5는 네이티브 멀티모달 모델 (hybrid)
# --language-model-only를 안 쓰면 자동으로 비전 인코더 로드
# A6000 48GB × 2 (tp=2): BF16 ~60-65GB (비전 인코더 포함)
#
# ⚠️ 버전 요구사항:
#   - vLLM ≥ 0.17.0 (v0.16.0 미지원 확인됨)
#   - Transformers ≥ 5.0 필수 (qwen3_5 아키텍처)
#   - Docker: nightly 또는 v0.18.0+ 권장
#     → ./start.sh qwen3.5-27b-vlm --tag nightly
#   - v0.17.1에서 아키텍처 미인식 시:
#     FROM vllm/vllm-openai:v0.17.1
#     RUN uv pip install --system git+https://github.com/huggingface/transformers.git
#
# 텍스트 전용은 qwen3.5-27b.yaml 사용
#
# API 호출 예시 (이미지):
#   messages: [
#     {"role": "user", "content": [
#       {"type": "image_url", "image_url": {"url": "https://...png"}},
#       {"type": "text", "text": "이미지를 설명해줘"}
#     ]}
#   ]
# ═══════════════════════════════════════════════════════════════

model:
  name: "qwen3.5-27b-vlm"
  path: "Qwen/Qwen3.5-27B"
  description: "Qwen3.5 27B Dense VLM — 이미지 이해 + reasoning (vLLM ≥0.17, nightly 권장)"

vllm:
  port: 30071
  tensor_parallel_size: 2
  max_model_len: 32768             # VLM은 이미지 토큰이 추가되므로 보수적으로
  gpu_memory_utilization: 0.85
  dtype: "auto"

  # Reasoning
  reasoning_parser: "qwen3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  # ⚠️ Gated Delta Networks + Vision encoder → CUDA graph 이슈 가능
  enforce_eager: true
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    # 멀티모달 전처리 스레드 제한 (CPU 경합 방지)
    OMP_NUM_THREADS: "1"

  # VLM 전용: 이미지 최대 5장, 비디오 비활성화 (VRAM 절약)
  extra_args:
    - "--limit-mm-per-prompt"
    - "image=5,video=0"
