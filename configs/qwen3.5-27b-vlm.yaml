# Qwen3.5-27B — Vision Language Model (VLM)
# ═══════════════════════════════════════════════════════════════
# 네이티브 멀티모달 (비전 인코더 자동 로드)
# L40S 45GB × 2 (tp=2): BF16 ~60-65GB (비전 인코더 포함)
# vLLM ≥ 0.18.0 필요 (transformers 4.56.x 포함)
# 텍스트 전용 → qwen3.5-27b.yaml 사용
# ═══════════════════════════════════════════════════════════════

model:
  name: "qwen3.5-27b-vlm"
  path: "Qwen/Qwen3.5-27B"
  description: "Qwen3.5 27B Dense VLM — 이미지 이해 + reasoning (vLLM ≥0.18.0)"

vllm:
  port: 30071
  tensor_parallel_size: 2
  max_model_len: 16384               # L40S: A6000 대비 VRAM 적음 + 이미지 토큰 고려
  gpu_memory_utilization: 0.90        # L40S 45GB — 빡빡하므로 0.90으로 올림
  dtype: "auto"

  # Reasoning
  reasoning_parser: "qwen3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  # ⚠️ Gated Delta Networks + Vision encoder → CUDA graph 이슈 가능
  enforce_eager: true
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
    OMP_NUM_THREADS: "1"

  # VLM 전용: 이미지 최대 3장, 비디오 비활성화 (VRAM 절약)
  extra_args:
    - "--limit-mm-per-prompt"
    - "image=3,video=0"
