# Qwen3.5-27B — 텍스트 전용 (비전 인코더 비활성화)
# ═══════════════════════════════════════════════════════════════
# Dense 27B — Gated Delta Networks 아키텍처 (Mamba 계열)
# A6000 48GB × 2 (tp=2): BF16 ~54GB
#
# ⚠️ 버전 요구사항:
#   - vLLM ≥ 0.17.0 (v0.16.0 미지원 확인됨)
#   - Transformers ≥ 5.0 필수 (qwen3_5 아키텍처 인식)
#   - Docker: nightly 또는 v0.18.0+ 권장
#     → ./start.sh qwen3.5-27b --tag nightly
#   - v0.17.1 이미지에서 아키텍처 미인식 시:
#     커스텀 Dockerfile로 transformers 업그레이드 필요
#     FROM vllm/vllm-openai:v0.17.1
#     RUN uv pip install --system git+https://github.com/huggingface/transformers.git
#
# ⚠️ 이미지/비디오 입력이 필요하면 qwen3.5-27b-vlm.yaml 사용
# ═══════════════════════════════════════════════════════════════

model:
  name: "qwen3.5-27b"
  path: "Qwen/Qwen3.5-27B"
  description: "Qwen3.5 27B Dense — 텍스트 전용, 코딩/추론 (vLLM ≥0.17, nightly 권장)"

vllm:
  port: 8000
  tensor_parallel_size: 2
  max_model_len: 32768
  gpu_memory_utilization: 0.85
  dtype: "auto"

  # Reasoning
  reasoning_parser: "qwen3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  # ⚠️ Gated Delta Networks는 CUDA graph와 호환 이슈 가능
  # 시작 시 에러 나면 true로 변경
  enforce_eager: true
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"

  # 비전 인코더 비활성화 → VRAM 절약
  extra_args:
    - "--language-model-only"
