# BAAI/bge-m3 — 다국어 Embedding
# ═══════════════════════════════════════════════════════════════
# 568M params, 1024dim, max 8192 tokens
# VRAM ~1.1GB
# vLLM ≥ 0.18.0 + --runner pooling
# API: POST /v1/embeddings
# ═══════════════════════════════════════════════════════════════

model:
  name: "bge-m3"
  path: "BAAI/bge-m3"
  description: "BGE-M3 568M — 다국어 embedding, 1024dim"

vllm:
  port: 10073
  runner: "pooling"
  tensor_parallel_size: 1
  max_model_len: 8192
  gpu_memory_utilization: 0.10
  dtype: "auto"
  trust_remote_code: true
