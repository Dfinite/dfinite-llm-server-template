# Nemotron-3-Nano-30B — NVIDIA MoE 모델
# 30B total / 3B active — 빠른 추론, reasoning ON/OFF 토글 가능
# A6000 48GB × 2 (tp=2): BF16 ~60GB → 가동 가능

model:
  name: "nemotron-nano"
  path: "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
  description: "Nemotron-3-Nano 30B MoE — 범용, reasoning 토글 지원"

vllm:
  port: 8000
  tensor_parallel_size: 2
  max_model_len: 32768
  gpu_memory_utilization: 0.85
  dtype: "auto"

  # Reasoning (Nemotron 전용 parser — vLLM 지원 확인 필요)
  # vLLM에서 nano_v3 미지원 시 deepseek_r1 사용
  reasoning_parser: "deepseek_r1"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "hermes"

  # Performance
  trust_remote_code: true
  enforce_eager: false
  enable_prefix_caching: true

  env: {}
  extra_args: []
