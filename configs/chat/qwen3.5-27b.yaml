# Qwen3.5-27B — 텍스트 전용 (비전 인코더 비활성화)
# ═══════════════════════════════════════════════════════════════
# Dense 27B — Gated Delta Networks 아키텍처
# L40S 45GB × 2 (tp=2): BF16 ~54GB
# vLLM ≥ 0.18.0 필요 (transformers 4.56.x 포함)
# 이미지/비디오 → qwen3.5-27b-vlm.yaml 사용
# ═══════════════════════════════════════════════════════════════

model:
  name: "qwen3.5-27b"
  path: "Qwen/Qwen3.5-27B"
  description: "Qwen3.5 27B Dense — 텍스트 전용, 코딩/추론 (vLLM ≥0.18.0)"

vllm:
  tensor_parallel_size: 2
  max_model_len: 32768
  gpu_memory_utilization: 0.85
  dtype: "auto"

  # Reasoning
  reasoning_parser: "qwen3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  # ⚠️ Gated Delta Networks는 CUDA graph와 호환 이슈 가능
  # 시작 시 에러 나면 true로 변경
  enforce_eager: true
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"

  # 비전 인코더 비활성화 → VRAM 절약
  extra_args:
    - "--language-model-only"
