# Nemotron-3-Nano-30B — NVIDIA Mamba2-Transformer Hybrid MoE 모델
# 30B total / 3.5B active — 빠른 추론, reasoning ON/OFF 토글 가능
# A6000 48GB × 2 (tp=2): BF16 ~60GB → 가동 가능
#
# ⚠️ reasoning parser 사용 시 플러그인 파일 필요:
#   wget https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16/resolve/main/nano_v3_reasoning_parser.py

model:
  name: "nemotron-nano"
  path: "nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16"
  description: "Nemotron-3-Nano 30B MoE — 범용, reasoning 토글 지원"

vllm:
  tensor_parallel_size: 2
  max_model_len: 32768
  gpu_memory_utilization: 0.85
  dtype: "auto"

  # Reasoning (Nemotron 전용 plugin parser)
  reasoning_parser: "nano_v3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  enforce_eager: false

  env: {}
  extra_args:
    - "--reasoning-parser-plugin"
    - "nano_v3_reasoning_parser.py"
