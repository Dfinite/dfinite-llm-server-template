# Qwen3-Coder-Next Q5_K_M — GGUF 5-bit 양자화
# MoE 80B total / 3B active — 코딩 에이전트 최상위 모델
# A6000 48GB × 2 (tp=2): Q5_K_M ~56.8GB → GPU당 ~28.4GB
# KV cache GPU당 ~10GB 여유

model:
  name: "qwen3-coder-next-q5"
  path: "unsloth/Qwen3-Coder-Next-GGUF:Q5_K_M"
  description: "Qwen3 Coder Next 80B MoE 5-bit GGUF — 코딩 에이전트"

vllm:
  tensor_parallel_size: 2
  max_model_len: 65536
  gpu_memory_utilization: 0.80
  dtype: "auto"

  # Reasoning — Coder 계열은 non-thinking 모델이므로 reasoning_parser 불필요

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  enforce_eager: false
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  extra_args:
    - "--hf-config-path"
    - "Qwen/Qwen3-Coder-Next"
