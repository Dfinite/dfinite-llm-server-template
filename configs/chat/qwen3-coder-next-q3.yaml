# Qwen3-Coder-Next UD-Q3_K_XL — Unsloth Dynamic 3-bit GGUF
# MoE 80B total / 3B active — 코딩 에이전트 최상위 모델
# A6000 48GB 단일 GPU: GGUF ~36.3GB + reranker/embedding 공존 가능
# ⚠️ vLLM MoE GGUF 지원 불안정 — 문제 시 llama.cpp/Ollama 대체 고려

model:
  name: "qwen3-coder-next-q3"
  path: "unsloth/Qwen3-Coder-Next-GGUF:UD-Q3_K_XL"
  description: "Qwen3 Coder Next 80B MoE 3-bit GGUF — 코딩 에이전트 (Unsloth 양자화)"

vllm:
  port: 10071
  tensor_parallel_size: 1
  max_model_len: 32768
  gpu_memory_utilization: 0.85
  dtype: "auto"

  # Reasoning
  reasoning_parser: "qwen3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  enforce_eager: false
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  extra_args:
    - "--hf-config-path"
    - "Qwen/Qwen3-Coder-Next"
