# Qwen3.5-35B-A3B — MoE 모델
# ═══════════════════════════════════════════════════════════════
# MoE 35B total / 3B active — Gated Delta Networks 아키텍처
# L40S 45GB × 2 (tp=2) 기준 GPTQ-Int4 권장
# vLLM ≥ 0.18.0 필요 (transformers 4.56.x 포함)
# BF16: ~70GB VRAM → max_model_len 줄여야 함
# GPTQ-Int4: ~20GB → 넉넉한 context 가능
# ═══════════════════════════════════════════════════════════════

model:
  name: "qwen3.5-35b"
  path: "Qwen/Qwen3.5-35B-A3B-GPTQ-Int4"    # BF16: "Qwen/Qwen3.5-35B-A3B"
  description: "Qwen3.5 35B MoE — 에이전트/thinking 모드 (vLLM ≥0.18.0)"

vllm:
  tensor_parallel_size: 2
  max_model_len: 131072            # GPTQ-Int4: 128K 가능 / BF16: 32768로 줄일 것
  gpu_memory_utilization: 0.85
  dtype: "auto"

  # Reasoning (Qwen3.5 전용 parser)
  reasoning_parser: "qwen3"

  # Tool calling
  enable_auto_tool_choice: true
  tool_call_parser: "qwen3_coder"

  # Performance
  trust_remote_code: true
  # ⚠️ Gated Delta Networks + MoE → CUDA graph 이슈 가능
  enforce_eager: true
  enable_prefix_caching: true

  env:
    VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  extra_args: []
