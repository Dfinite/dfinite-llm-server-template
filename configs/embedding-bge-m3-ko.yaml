# dragonkue/BGE-m3-ko — 한국어 특화 Embedding
# ═══════════════════════════════════════════════════════════════
# 568M params, 1024dim, max 8192 tokens
# BAAI/bge-m3 기반 한국어 추가 학습
# VRAM ~1.1GB
# vLLM ≥ 0.18.0 + --runner pooling
# API: POST /v1/embeddings
# ═══════════════════════════════════════════════════════════════

model:
  name: "bge-m3-ko"
  path: "dragonkue/BGE-m3-ko"
  description: "BGE-M3-ko 568M — 한국어 특화 embedding, 1024dim"

vllm:
  port: 10073
  runner: "pooling"
  tensor_parallel_size: 1
  max_model_len: 8192
  gpu_memory_utilization: 0.10
  dtype: "auto"
  trust_remote_code: true
