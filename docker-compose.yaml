# ═══════════════════════════════════════════════════════════════
# vLLM API Server — Docker Compose
# ═══════════════════════════════════════════════════════════════
# LLM만:        ./start.sh qwen3-32b-awq
# LLM+Reranker: ./start.sh qwen3-32b-awq --with-reranker
# LLM+전체:     ./start.sh qwen3-32b-awq --with-reranker --with-embedding
# Embedding만:  ./start.sh --embedding-only
#
# ── GPU 전략 (A6000 48GB × 2) ──
# LLM:      tp=2, 양쪽 GPU → gpu_memory_utilization으로 비율 제한
# Reranker: tp=1, 같은 GPU에서 남은 VRAM 활용 (568M → ~1.1GB)
# ═══════════════════════════════════════════════════════════════

services:

  # ─── LLM 서비스 (모델 교체 가능) ───────────────────────────
  qwen-demo:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-v0.18.0}
    container_name: vllm-${MODEL_NAME:-default}
    ports:
      - "${HOST_PORT:-10071}:10071"
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - HF_TOKEN=${HF_TOKEN:-}
      - NCCL_IB_DISABLE=${NCCL_IB_DISABLE:-1}
      - NCCL_P2P_DISABLE=${NCCL_P2P_DISABLE:-0}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-0}
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:10071/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ${VLLM_CMD_ARGS}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Reranker 서비스 ──────────────────────────────────────
  reranker-women:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-v0.18.0}
    container_name: vllm-reranker
    ports:
      - "${RERANKER_PORT:-10072}:10072"
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=${RERANKER_GPU:-all}
      - HF_TOKEN=${HF_TOKEN:-}
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:10072/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >-
      ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      --host 0.0.0.0
      --port 10072
      --runner pooling
      --tensor-parallel-size ${RERANKER_TP:-1}
      --gpu-memory-utilization ${RERANKER_GPU_UTIL:-0.05}
      --dtype auto
      --trust-remote-code
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ─── Embedding 서비스 ───────────────────────────────────────
  embedding-women:
    image: vllm/vllm-openai:${VLLM_IMAGE_TAG:-v0.18.0}
    container_name: vllm-embedding
    ports:
      - "${EMBEDDING_PORT:-10073}:10073"
    volumes:
      - ${HF_CACHE:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=${EMBEDDING_GPU:-all}
      - HF_TOKEN=${HF_TOKEN:-}
    ipc: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:10073/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >-
      ${EMBEDDING_MODEL:-BAAI/bge-m3}
      --host 0.0.0.0
      --port 10073
      --runner pooling
      --tensor-parallel-size ${EMBEDDING_TP:-1}
      --gpu-memory-utilization ${EMBEDDING_GPU_UTIL:-0.10}
      --max-model-len ${EMBEDDING_MAX_MODEL_LEN:-8192}
      --dtype auto
      --trust-remote-code
      ${EMBEDDING_EXTRA_ARGS:-}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
