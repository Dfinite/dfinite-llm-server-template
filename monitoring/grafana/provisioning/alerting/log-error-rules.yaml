apiVersion: 1

# 로그 에러 알림 규칙
# 정책: ERROR·CRITICAL 레벨만 알림 대상 (docs/logs/06-log-levels-and-alerting.md)
#
# 수신처(contact point)는 contact-points.yaml 에서 설정합니다.
# 수신처 미설정 시 규칙은 평가되지만 알림은 발송되지 않습니다.

groups:
  - orgId: 1
    name: log-error-alerts
    folder: Monitoring Alerts
    interval: 1m
    rules:

      # ── 규칙 1: 전체 컨테이너 ERROR·CRITICAL ────────────────────────────
      - uid: log-error-all-containers
        title: "컨테이너 ERROR·CRITICAL 감지"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: 'sum(rate({job="docker"} |~ "(?i)error|critical" [5m]))'
              queryType: range
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "컨테이너 ERROR/CRITICAL 로그 감지"
          description: "전체 컨테이너에서 ERROR 또는 CRITICAL 로그 발생률이 0을 초과했습니다."
        labels:
          severity: critical
          source: loki
        isPaused: false

      # ── 규칙 2: vLLM 인스턴스 ERROR·CRITICAL ────────────────────────────
      - uid: log-error-vllm
        title: "vLLM ERROR·CRITICAL 감지"
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: 'sum(rate({container_name=~"vllm.*"} |~ "(?i)error|critical" [5m]))'
              queryType: range
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              refId: C
              type: threshold
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "vLLM ERROR/CRITICAL 로그 감지"
          description: "vLLM 컨테이너에서 ERROR 또는 CRITICAL 로그 발생률이 0을 초과했습니다."
        labels:
          severity: critical
          source: loki
          service: vllm
        isPaused: false
